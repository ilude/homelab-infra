---
- name: Validate Tailscale client variables
  ansible.builtin.assert:
    that:
      - tailscale_client_vmid is defined
      - not (tailscale_client_restore_backup | default(false) | bool) or tailscale_client_backup_archive is defined
    fail_msg: tailscale_client_vmid is required, and tailscale_client_backup_archive is required when restore is enabled.
  when: tailscale_client_enabled | default(false) | bool
- name: Install Tailscale APT repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true
  when: tailscale_client_enabled | default(false) | bool
- name: Install Tailscale Debian 13 signing keyring
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
    checksum: sha256:3e03dacf222698c60b8e2f990b809ca1b3e104de127767864284e6c228f1fb39
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'
    owner: root
    group: root
  when: tailscale_client_enabled | default(false) | bool
- name: Install Tailscale Debian 13 APT source
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/trixie.tailscale-keyring.list
    checksum: sha256:5a1b21b30892bf22fb5d7c4f52fefe9b65efda2100e82abba2e0849da2a2264b
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: '0644'
    owner: root
    group: root
  when: tailscale_client_enabled | default(false) | bool
- name: Install Tailscale package from signed APT repository
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  when: tailscale_client_enabled | default(false) | bool
- name: Enable IPv4 forwarding in Tailscale client LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - install -d -m 0755 /etc/sysctl.d && printf '%s\n' 'net.ipv4.ip_forward = 1' > /etc/sysctl.d/99-tailscale-client.conf && sysctl -p /etc/sysctl.d/99-tailscale-client.conf >/dev/null  # yamllint disable-line rule:line-length
  changed_when: false
  when:
    - tailscale_client_enabled | default(false) | bool
    - tailscale_client_enable_ip_forwarding | default(true) | bool
- name: Install Tailscale backup archive
  ansible.builtin.copy:
    src: '{{ tailscale_client_backup_archive }}'
    dest: /tmp/tailscale-client-backup.tgz
    mode: '0600'
    owner: root
    group: root
  no_log: true
  when:
    - tailscale_client_enabled | default(false) | bool
    - tailscale_client_restore_backup | default(false) | bool
- name: Restore Tailscale state and selected OS config from backup
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - set -euo pipefail; systemctl stop tailscaled || true; tar --warning=no-unknown-keyword -xzf /tmp/tailscale-client-backup.tgz -C / --wildcards --no-anchored etc/default/tailscaled etc/systemd/system/tailscaled.service.d var/lib/tailscale/tailscaled.state etc/sysctl.d; chown root:root /var/lib/tailscale/tailscaled.state 2>/dev/null || true; chmod 0600 /var/lib/tailscale/tailscaled.state 2>/dev/null || true; systemctl daemon-reload; rm -f /tmp/tailscale-client-backup.tgz  # yamllint disable-line rule:line-length
  no_log: true
  notify: Restart tailscaled
  when:
    - tailscale_client_enabled | default(false) | bool
    - tailscale_client_restore_backup | default(false) | bool
- name: Ensure tailscaled is enabled and running
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - tailscaled
  changed_when: false
  when: tailscale_client_enabled | default(false) | bool
- name: Authenticate Tailscale client with auth key when requested
  ansible.builtin.command:
    argv: "{{\n  [\n    'tailscale', 'up', '--authkey', tailscale_client_auth_key,\n  ] + (tailscale_client_up_args | default([]))\n}}"
  no_log: true
  when:
    - tailscale_client_enabled | default(false) | bool
    - not tailscale_client_restore_backup | default(false) | bool
    - tailscale_client_auth_key is defined
    - tailscale_client_auth_key | length > 0
- name: Flush Tailscale restart before service checks
  ansible.builtin.meta: flush_handlers
  when: tailscale_client_enabled | default(false) | bool
- name: Verify tailscaled service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - tailscaled
  register: tailscale_client_active
  changed_when: false
  retries: 6
  delay: 5
  until: tailscale_client_active.rc == 0
  when: tailscale_client_enabled | default(false) | bool
- name: Check Tailscale client status
  ansible.builtin.command:
    argv:
      - tailscale
      - status
  register: tailscale_client_status
  changed_when: false
  when: tailscale_client_enabled | default(false) | bool
