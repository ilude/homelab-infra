---
- name: Install Technitium prerequisites in LXC
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ technitium_vmid | string }}"
      - --
      - bash
      - -lc
      - >-
        set -euo pipefail;
        missing=0;
        for package in curl ca-certificates; do
          dpkg-query -W "${package}" >/dev/null 2>&1 || missing=1;
        done;
        if ! dpkg-query -W libicu72 >/dev/null 2>&1 && ! dpkg-query -W libicu-dev >/dev/null 2>&1; then
          missing=1;
        fi;
        if [[ "${missing}" -eq 1 ]]; then
          DEBIAN_FRONTEND=noninteractive apt-get update;
          (DEBIAN_FRONTEND=noninteractive apt-get install -y curl ca-certificates libicu72 ||
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl ca-certificates libicu-dev);
        fi
  changed_when: false

- name: Check Technitium service presence
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ technitium_vmid | string }}"
      - --
      - bash
      - -lc
      - systemctl list-unit-files dns.service >/dev/null 2>&1
  register: technitium_service_check
  changed_when: false
  failed_when: false

- name: Install Technitium DNS Server
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ technitium_vmid | string }}"
      - --
      - bash
      - -lc
      - curl -sSL https://download.technitium.com/dns/install.sh | bash
  when: technitium_service_check.rc != 0

- name: Ensure Technitium service is running
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ technitium_vmid | string }}"
      - --
      - systemctl
      - enable
      - --now
      - dns
  changed_when: false
