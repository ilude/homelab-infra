---
- name: Bootstrap Tailscale client LXC
  hosts: pve
  gather_facts: false
  roles:
    - role: lxc_ready
      vars:
        lxc_ready_vmid: "{{ tailscale_client_vmid }}"
        lxc_ready_name: tailscale_client
      when: tailscale_client_enabled | default(false) | bool
    - role: tailscale_client
      when: tailscale_client_enabled | default(false) | bool
