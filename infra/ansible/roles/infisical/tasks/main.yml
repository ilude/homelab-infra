---
- name: Validate Infisical required variables
  ansible.builtin.assert:
    that:
      - infisical_vmid is defined
      - infisical_domain is defined
      - infisical_encryption_key is defined
      - infisical_encryption_key is match('^[0-9a-fA-F]{32}$')
      - infisical_auth_secret is defined
      - infisical_auth_secret | length >= 32
      - infisical_postgres_password is defined
      - infisical_postgres_password | length >= 16
      - caddy_email is defined
      - caddy_cloudflare_api_token is defined
    fail_msg: infisical_vmid, infisical_domain, infisical_encryption_key, infisical_auth_secret, infisical_postgres_password, caddy_email, and caddy_cloudflare_api_token are required.  # yamllint disable-line rule:line-length
- name: Install Infisical OS dependencies in LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "set -euo pipefail; packages=\"ca-certificates caddy curl docker.io git gnupg openssh-client\"; missing=0; for package in ${packages}; do\n  dpkg-query -W \"${package}\" >/dev/null 2>&1 || missing=1;\ndone; if [[ \"${missing}\" -eq 1 ]]; then\n  DEBIAN_FRONTEND=noninteractive apt-get update;\n  DEBIAN_FRONTEND=noninteractive apt-get install -y ${packages};\nfi; systemctl enable --now docker"  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install verified Docker Compose CLI plugin in Infisical LXC
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail; version="{{ infisical_compose_version | default('5.3.0') }}";
        current="$(docker compose version --short 2>/dev/null || true)";
        if [[ "${current}" != "${version}" ]]; then arch="$(uname -m)";
        case "${arch}" in x86_64) asset_arch=x86_64; sha256="{{ infisical_compose_sha256_amd64 }}" ;;
        aarch64) asset_arch=aarch64; sha256="{{ infisical_compose_sha256_arm64 }}" ;;
        *) echo "unsupported architecture: ${arch}" >&2; exit 1 ;; esac;
        tmp="$(mktemp -d)"; trap 'rm -rf "${tmp}"' EXIT; artifact="${tmp}/docker-compose";
        curl -fsSL -o "${artifact}" "https://github.com/docker/compose/releases/download/v${version}/docker-compose-linux-${asset_arch}";
        printf '%s  %s\n' "${sha256}" "${artifact}" | sha256sum -c -;
        install -d -m 0755 /usr/local/lib/docker/cli-plugins;
        install -m 0755 "${artifact}" /usr/local/lib/docker/cli-plugins/.docker-compose-new;
        mv -f /usr/local/lib/docker/cli-plugins/.docker-compose-new /usr/local/lib/docker/cli-plugins/docker-compose; fi
  changed_when: false
- name: Ensure Infisical directories exist
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - install -d -m 0750 /etc/infisical /opt/infisical {{ infisical_data_dir | default('/var/lib/infisical') }} {{ infisical_data_dir | default('/var/lib/infisical') }}/postgres {{ infisical_data_dir | default('/var/lib/infisical') }}/redis  # yamllint disable-line rule:line-length
  changed_when: false
- name: Install Infisical env
  ansible.builtin.template:
    src: infisical.env.j2
    dest: /etc/infisical/infisical.env
    mode: '0600'
    owner: root
    group: root
  no_log: true
  notify: Restart infisical
- name: Install Infisical Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/infisical/docker-compose.yml
    mode: '0644'
    owner: root
    group: root
  notify: Restart infisical
- name: Start Infisical Compose stack
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - cd /opt/infisical && set -a && . /etc/infisical/infisical.env && set +a && docker compose -f docker-compose.yml up -d
  changed_when: false
  no_log: true
- name: Build pinned Caddy for Infisical LXC
  ansible.builtin.include_role:
    name: caddy_build
- name: Install Infisical Caddy env
  ansible.builtin.template:
    src: caddy.env.j2
    dest: /etc/caddy/env
    mode: '0600'
    owner: root
    group: caddy
  no_log: true
  notify: Restart caddy
- name: Install Infisical Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Ensure Infisical Caddy systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root
- name: Install Infisical Caddy systemd override
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: '0644'
    owner: root
    group: root
  notify: Restart caddy
- name: Validate Infisical Caddy config
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - set -a && . /etc/caddy/env && set +a && caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
- name: Enable Infisical Caddy service
  ansible.builtin.command:
    argv:
      - systemctl
      - enable
      - --now
      - caddy
  changed_when: false
- name: Flush Infisical service restarts before endpoint checks
  ansible.builtin.meta: flush_handlers
- name: Verify Infisical Docker service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - docker
  changed_when: false
  register: infisical_docker_active
  retries: 6
  delay: 5
  until: infisical_docker_active.rc == 0
- name: Verify Infisical Caddy service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - caddy
  changed_when: false
  register: infisical_caddy_active
  retries: 6
  delay: 5
  until: infisical_caddy_active.rc == 0
- name: Verify Infisical Compose services are running
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - >-
        set -euo pipefail;
        running="$(docker compose -f /opt/infisical/docker-compose.yml ps --status running --services)";
        for service in db redis infisical; do
          grep -Fx "${service}" <<<"${running}" >/dev/null;
        done
  changed_when: false
  register: infisical_compose_running_check
  retries: 24
  delay: 5
  until: infisical_compose_running_check.rc == 0
- name: Verify Infisical HTTPS route locally
  ansible.builtin.command:
    argv:
      - curl
      - --fail
      - --silent
      - --show-error
      - --insecure
      - --max-time
      - "10"
      - --resolve
      - "{{ infisical_domain }}:443:127.0.0.1"
      - "https://{{ infisical_domain }}/"
  changed_when: false
  register: infisical_https_check
  retries: 24
  delay: 5
  until: infisical_https_check.rc == 0
