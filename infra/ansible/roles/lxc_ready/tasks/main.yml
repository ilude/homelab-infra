---
- name: Validate LXC readiness inputs
  ansible.builtin.assert:
    that:
      - lxc_ready_vmid is defined
      - (lxc_ready_vmid | string | length) > 0
      - proxmox_node_name is defined
      - (proxmox_node_name | string | length) > 0
    fail_msg: lxc_ready_vmid and proxmox_node_name are required

- name: Verify PVE inventory target matches configured node
  ansible.builtin.command:
    argv:
      - hostname
      - --short
  register: lxc_ready_pve_hostname
  changed_when: false

- name: Fail when PVE inventory target does not match configured node
  ansible.builtin.assert:
    that:
      - lxc_ready_pve_hostname.stdout | trim == proxmox_node_name
    fail_msg: >-
      PVE inventory target {{ lxc_ready_pve_hostname.stdout | trim }} does not match
      configured Proxmox node {{ proxmox_node_name }}.

- name: Wait for LXC to report running {{ lxc_ready_name | default(lxc_ready_vmid) }}
  ansible.builtin.command:
    argv:
      - pct
      - status
      - "{{ lxc_ready_vmid | string }}"
  register: lxc_ready_status
  changed_when: false
  failed_when: false
  retries: "{{ lxc_ready_retries | default(20) }}"
  delay: "{{ lxc_ready_delay_seconds | default(3) }}"
  until:
    - lxc_ready_status.rc == 0
    - "'status: running' in lxc_ready_status.stdout"

- name: Wait for systemd in LXC {{ lxc_ready_name | default(lxc_ready_vmid) }}
  ansible.builtin.command:
    argv:
      - pct
      - exec
      - "{{ lxc_ready_vmid | string }}"
      - --
      - systemctl
      - is-system-running
  register: lxc_ready_systemd
  changed_when: false
  failed_when: false
  retries: "{{ lxc_ready_systemd_retries | default(30) }}"
  delay: "{{ lxc_ready_delay_seconds | default(3) }}"
  until: lxc_ready_systemd.rc == 0 or lxc_ready_systemd.stdout in ['running', 'degraded']
