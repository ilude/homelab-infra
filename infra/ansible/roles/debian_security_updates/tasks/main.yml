---
- name: Install Debian automatic security update support
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true

- name: Enable daily package index and security update checks
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Restrict automatic upgrades to Debian security repositories
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52homelab-security-updates
    owner: root
    group: root
    mode: '0644'
    content: |
      Unattended-Upgrade::Origins-Pattern {
          "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::OnlyOnACPower "false";

- name: Enable Debian automatic security update timer
  ansible.builtin.systemd:
    name: apt-daily-upgrade.timer
    enabled: true
    state: started

- name: Verify automatic security update policy
  ansible.builtin.command:
    argv:
      - apt-config
      - dump
  register: debian_security_updates_policy
  changed_when: false
  failed_when: >-
    'APT::Periodic::Unattended-Upgrade "1"' not in debian_security_updates_policy.stdout or
    'Unattended-Upgrade::Automatic-Reboot "false"' not in debian_security_updates_policy.stdout
