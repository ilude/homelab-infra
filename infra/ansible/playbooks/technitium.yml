---
- name: Prepare Technitium DNS LXC lifecycle boundary
  hosts: pve
  gather_facts: false
  roles:
    - role: lxc_ready
      vars:
        lxc_ready_vmid: '{{ technitium_vmid }}'
        lxc_ready_name: technitium
- name: Run direct access handoff for Technitium DNS
  ansible.builtin.import_playbook: direct-access-ready.yml
  vars:
    direct_access_target_group: technitium
- name: Configure Technitium DNS service directly
  hosts: technitium
  gather_facts: false
  become: true
  roles:
    - debian_security_updates
    - technitium
    - role: technitium_keepalived
      vars:
        technitium_keepalived_state: MASTER
        technitium_keepalived_priority: 150
        technitium_keepalived_virtual_ipv4_address: "{{ technitium_virtual_ipv4_address }}"
        technitium_keepalived_peer_ipv4_address: >-
          {{ hostvars[(groups['technitium_secondary'] | default([]) | first) | default('')].ansible_host | default('') }}
        technitium_keepalived_cluster_domain: "{{ technitium_cluster_domain | default('') }}"
