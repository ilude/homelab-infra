managed_service_state_catalog:
  hermes:
    group: hermes
    description: Hermes memory, soul, config, history, and dashboard runtime state.
    services:
      - hermes-gateway
      - hermes-dashboard
    paths:
      - path: "/home/{{ hermes_runtime_user | default('anvil') }}/.hermes"
        owner: "{{ hermes_runtime_user | default('anvil') }}"
        group: "{{ hermes_runtime_user | default('anvil') }}"
        recurse: true
  forgejo:
    group: forgejo
    description: Forgejo application configuration, repositories, database, attachments, and logs.
    services:
      - forgejo
      - caddy
    paths:
      - path: /etc/forgejo
        owner: root
        group: git
        recurse: true
      - path: /var/lib/forgejo
        owner: git
        group: git
        recurse: true
  technitium:
    group: technitium
    description: Technitium DNS server configuration, zones, block lists, logs, and app data.
    services:
      - dns
      - caddy
    paths:
      - path: /etc/dns
        owner: dns-server
        group: dns-server
        recurse: true
  onramp_host:
    group: onramp_host
    description: Shared onramp host Caddy configuration and repo-managed app deployment directories.
    services:
      - caddy
    paths:
      - path: /etc/caddy
        owner: root
        group: root
        recurse: false
      - path: "{{ onramp_host_deploy_dir }}"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: true
  infisical_onramp:
    group: onramp_host
    description: Infisical onramp compose/env files and container data under the onramp deploy directory.
    services:
      - caddy
    user_services:
      - infisical-onramp.service
    user_service_owner: "{{ onramp_host_deploy_user }}"
    paths:
      - path: "{{ onramp_host_deploy_dir }}/infisical"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: true
      - path: /etc/caddy/sites.d/infisical.caddy
        owner: root
        group: root
        recurse: false
  searxng_onramp:
    group: onramp_host
    description: SearXNG onramp compose/env/settings files and container data under the onramp deploy directory.
    services:
      - caddy
    user_services:
      - searxng-onramp.service
    user_service_owner: "{{ onramp_host_deploy_user }}"
    paths:
      - path: "{{ onramp_host_deploy_dir }}/searxng"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: true
      - path: /etc/caddy/sites.d/searxng.caddy
        owner: root
        group: root
        recurse: false
  onclave_onramp:
    group: onramp_host
    description: Onclave app definition, private env, and persistent broker/core data on the onramp host.
    services:
      - caddy
    user_services:
      - onclave-onramp.service
    user_service_owner: "{{ onramp_host_deploy_user }}"
    paths:
      - path: "{{ onramp_host_deploy_dir }}/onclave"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: true
      - path: /etc/caddy/sites.d/onclave.caddy
        owner: root
        group: root
        recurse: false
  menos_onramp:
    group: onramp_host
    description: Menos app definition, private env, and authorized keys; PostgreSQL dumps and MinIO payloads are excluded.
    services:
      - caddy
    user_services:
      - menos-onramp.service
    user_service_owner: "{{ onramp_host_deploy_user }}"
    paths:
      - path: "{{ onramp_host_deploy_dir }}/menos/compose.yaml"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: false
      - path: "{{ onramp_host_deploy_dir }}/menos/compose.upstream.yaml"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: false
      - path: "{{ onramp_host_deploy_dir }}/menos/.env"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: false
      - path: "{{ onramp_host_deploy_dir }}/menos/authorized_keys"
        owner: "{{ onramp_host_deploy_user }}"
        group: "{{ onramp_host_deploy_user }}"
        recurse: false
      - path: /etc/caddy/sites.d/menos.caddy
        owner: root
        group: root
        recurse: false
